const contents = {"gateway-outage-wechat.md": "# 我的 AI Agent 宕机 6 小时，我却在睡觉：一次事故催生的三层防护\n\n> 6 小时宕机，2 分钟修复。这次事故教会我：无监控 = 盲飞。\n\n---\n\n## 我是谁，在干嘛\n\n我是 MiaoDX，目前在小米做机器人相关的工作。业余时间跑两个 AI Agent —— WLB（负责决策规划）和 GSD（负责执行落地）—— 帮我处理各种自动化任务，从代码提交到消息路由，从文档整理到跨平台同步。\n\n这不是玩具项目。WLB 和 GSD 每天处理几十条任务，涉及 GitHub、Slack、飞书、Telegram 多个平台。它们挂了，我的工作流就断了。\n\n**2026 年 3 月 11 日，凌晨 00:30 UTC，它们真的挂了。**\n\n---\n\n## 事情经过\n\nGateway 进程崩溃，留下两个 stale lock 文件卡死了重启流程。WLB 和 GSD 同时离线。\n\n**我是什么时候发现的？**\n\n早上 6:34。整整 6 小时 4 分钟后。\n\n为什么这么久？因为没监控，没告警，发生在凌晨（北京时间 8:30），而我在睡觉。\n\n---\n\n## 时间线\n\n| 时间 (UTC) | 事件 | 状态 |\n|-----------|------|------|\n| 00:30 | Gateway 进程崩溃 | ❌ 离线开始 |\n| 00:30-06:34 | WLB + GSD 无响应 | ❌ 持续离线 |\n| 06:34 | 我 SSH 登录手动重启 | ✅ 恢复 |\n\n**总离线时间：6 小时 4 分钟**  \n**实际修复时间：2 分钟**\n\n发现问题花了 6 小时，解决问题只花了 2 分钟。这比例不对劲。\n\n---\n\n## 根因：一个 lock 文件\n\n直接原因是两个 stale lock 文件：\n\n```\n/data/.openclaw/agents/main/sessions.json.lock\n/data/.openclaw/agents/main/.git/index.lock\n```\n\n前一个 session 崩溃时没优雅退出，lock 文件没释放。新进程启动时检测到 lock，直接卡住。\n\n**深层问题更严重：**\n\n| 层级 | 问题 | 结果 |\n|------|------|------|\n| 应用层 | 无 graceful shutdown | lock 残留 |\n| 容器层 | Docker 无 systemd | 不会自动恢复 |\n| 监控层 | 无健康检查 | 无感知 |\n| 告警层 | 无通知机制 | 无响应 |\n\n四层全空。盲飞 6 小时。\n\n---\n\n## 怎么修的\n\nSSH 进去，删 lock，重启。就这么简单：\n\n```bash\n# 1. 找 stale locks\nfind /data/.openclaw -name \"*.lock\" -mmin +60\n\n# 2. 删掉\nrm /data/.openclaw/agents/main/sessions.json.lock\nrm /data/.openclaw/agents/main/.git/index.lock\n\n# 3. 重启\nopenclaw gateway restart\n```\n\n2 分钟搞定。但前提是**我得先知道它挂了**。\n\n---\n\n## 教训与改进：三层防护架构\n\n这次事故直接催生了我们的「三层防护架构」。不是抽象概念，是具体落地的代码和配置。\n\n### L1 - 平台层：Railway 自动重启\n\nRailway 本身有容器健康检查，进程崩溃会自动拉新实例。但问题是：lock 文件在 Volume 里持久化，新容器启动时读到 stale lock，还是会卡死。\n\n**解决**：在 Dockerfile 的 entrypoint 里加一段清理逻辑：\n\n```bash\n#!/bin/bash\n# cleanup-locks.sh\nfind /data/.openclaw -name \"*.lock\" -mmin +5 -delete 2>/dev/null\nexec openclaw gateway start\n```\n\n容器启动前先清 5 分钟以上的 lock，避免残留。\n\n### L2 - 容器层：watchdog 脚本\n\n单靠平台不够。我们写了一个 watchdog 脚本，每 10 分钟运行一次：\n\n```bash\n#!/bin/bash\n# watchdog.sh\nHEALTH_URL=\"http://localhost:8080/health\"\nLOG_FILE=\"/var/log/agent-watchdog.log\"\n\nif ! curl -fs \"$HEALTH_URL\" > /dev/null 2>&1; then\n    echo \"[$(date)] Health check failed, restarting gateway...\" >> \"$LOG_FILE\"\n    openclaw gateway restart\nfi\n```\n\n用 cron 每 10 分钟触发：\n\n```\n*/10 * * * * /usr/local/bin/watchdog.sh\n```\n\n如果 health endpoint 无响应，自动重启 gateway。\n\n### L3 - 跨实例层：Agent 互相心跳\n\nWLB 和 GSD 现在会互相发心跳消息。如果一方 30 分钟没响应，另一方会：\n\n1. 尝试 ping 对方 health endpoint\n2. 如果失败，发 Slack 告警到 #alerts 频道\n3. 如果连续 3 次失败，标记对方为 offline，接管关键任务\n\n代码片段（WLB 侧）：\n\n```python\ndef check_gsd_health():\n    try:\n        r = requests.get(GSD_HEALTH_URL, timeout=10)\n        if r.status_code != 200:\n            alert_slack(\"GSD health check failed\")\n    except RequestException:\n        alert_slack(\"GSD unreachable\")\n```\n\n**结果**：现在任何一层出问题，Slack 会在 60 分钟内收到告警。不会再睡 6 小时才发现了。\n\n---\n\n## 数据复盘\n\n| 指标 | 数值 |\n|------|------|\n| 离线时间 | 6h 4min |\n| 发现时间 | 6h 4min（被动发现） |\n| 修复时间 | 2min |\n| 数据丢失 | 无（Volume 持久化） |\n\n好消息是数据没丢。坏消息是如果这 6 小时里有紧急事情，我完全不知道。\n\n---\n\n## 写在最后\n\n很多人问我：跑 AI Agent 最大的坑是什么？\n\n不是 prompt 调不好，不是 API 限额，是**你以为它在跑，其实它已经挂了**。\n\n**以前**：出问题靠我早上醒来发现，6 小时盲飞是常态。  \n**现在**：Slack 比我先知道，60 分钟内必有告警。\n\n这次 6 小时宕机给我上了一课：\n\n> **自动恢复 > 人工修复，监控 > 祈祷。**\n\n现在我的 Agent 有了三层防护，我睡觉也踏实多了。\n\n---\n\n*记录时间：2026-03-22*  \n*技术栈：OpenClaw + Railway + ClawCloud*", "openclaw-complete-guide.md": "# OpenClaw 实战指南：从部署到协作的完整踩坑记录\n\n> 本文档是 WLB 和 GSD 两个 OpenClaw 实例协作完成的实战指南，涵盖 Railway 和 ClawCloud Run 双平台部署、配置优化、最佳实践和真实案例。\n\n---\n\n## 目录\n\n1. [Part 1: 云端部署指南（双平台）](#part-1-云端部署指南双平台实际部署)\n2. [Part 2: 配置优化](#part-2-配置优化)\n3. [Part 3: 最佳实践](#part-3-最佳实践)\n4. [Part 4: 实战案例](#part-4-实战案例)\n\n---\n\n## Part 1: 云端部署指南（双平台实际部署）\n\n> **更新时间**: 2026-03-12  \n> **基于实际部署经验**: GSD 运行在 Railway，WLB 运行在 ClawCloud Run。\n\n## 1.1 部署方案概览\n\n我们采用 **双平台部署策略**：\n\n| 实例 | 平台 | 用途 | 特点 |\n|------|------|------|------|\n| **GSD** | Railway | 主力执行 | 轻量、易扩展、有冷启动 |\n| **WLB** | ClawCloud Run | 备用/高负载 | 持久容器、无冷启动、资源充足 |\n\n### 1.1.1 Railway 部署（GSD）\n\n**模板**: `ChaptersOfFloatingLife/clawdbot-railway-template` (MiaoDX fork)\n\n**核心改进**（相比原版）：\n- ✅ Anthropic 模型原生支持\n- ✅ CDP 浏览器支持（三层网络浏览 L3）\n- ✅ Web 管理界面（/healthz, /openclaw, /setup）\n\n**部署步骤**：\n\n```bash\n# 1. Railway Dashboard → New Project → Deploy from GitHub repo\n# 2. 选择模板：ChaptersOfFloatingLife/clawdbot-railway-template\n# 3. 添加环境变量：\n#    - SETUP_PASSWORD=your_secure_password\n#    - OPENAI_API_KEY=sk-...\n#    - ANTHROPIC_API_KEY=sk-ant-... (可选，用于 Claude 模型)\n# 4. 添加 Volume：/data → Persistent\n# 5. Deploy\n```\n\n**Web 管理端点**：\n\n| 端点 | 用途 | 访问方式 |\n|------|------|----------|\n| `/healthz` | 健康检查 | 公开，Railway 自动调用 |\n| `/openclaw` | 控制台 | 需 SETUP_PASSWORD |\n| `/setup` | 初始化向导 | 首次配置使用 |\n\n**关键特性**：\n- 冷启动：15-45s（免费 tier 休眠后）\n- 持久化：/data 目录（Volume 挂载）\n- 无 systemd：使用 wrapper API 管理 gateway\n\n### 1.1.2 ClawCloud Run 部署（WLB）\n\n**方式**: Docker 容器（非 Railway 模板）\n\n**资源配置**：\n- CPU: 16 cores Xeon Platinum\n- 内存: 123GB\n- 磁盘: 7.8GB Volume\n- **无冷启动**：持久容器，随时响应\n\n**部署步骤**：\n\n```bash\n# 1. ClawCloud Dashboard → Create Service → Docker\n# 2. 镜像：ubuntu:22.04（或其他基础镜像）\n# 3. 手动安装 OpenClaw（见官方文档）\n# 4. 配置 Volume：/data\n# 5. 设置环境变量\n```\n\n**与 Railway 的差异**：\n- 无内置 /openclaw /setup 端点（需自行配置或不用）\n- **有 /healthz 端点**：端口 18792（与 Railway 相同）\n- 资源充足，适合重负载任务\n- 无冷启动问题\n- 成本：$5/月（GitHub 老用户可能免费）\n\n## 1.2 平台对比实测\n\n### 1.2.1 基础指标\n\n| 指标 | ClawCloud Run | Railway |\n|------|---------------|---------|\n| **CPU** | 16 cores Xeon Platinum | 共享 |\n| **内存** | 123GB | ~512MB (免费额度) |\n| **磁盘** | 7.8GB Volume | /data Volume |\n| **冷启动** | 无（持久容器） | 15-45s |\n| **网络延迟** | ~980ms HTTP / 11ms DNS | 依赖地区 |\n| **Systemd** | ❌ | ❌ |\n| **Volume 持久化** | ✅ | ✅ |\n| **Web 管理界面** | ❌（无内置 /openclaw /setup） | ✅（内置 /openclaw /setup） |\n| **健康检查** | ✅ /healthz (18792) | ✅ /healthz (18792) |\n\n### 1.2.2 模型响应耗时实测\n\n**测试环境**：2026-03-05\n- **WLB (ClawCloud Run)**: 16 cores + 123GB RAM，持久容器\n- **GSD (Railway)**: 共享 CPU + ~512MB RAM，有冷启动\n- **模型**: `openai_mino/mimo-claw-0301`\n\n| 测试提示 | ClawCloud Run | Railway（热） |\n|----------|---------------|---------------|\n| \"你好\" | 7.45s | 8.20s |\n| \"请用中文回复：测试消息\" | 7.50s | 8.35s |\n| \"简单介绍一下你自己\" | 9.00s | 10.10s |\n| **平均耗时** | **7.98s** | **8.88s** |\n\n> 注：Railway 冷启动后首次请求需 +15-45s\n\n## 1.3 常见问题与修复\n\n### 1.3.1 Railway 冷启动慢\n\n**现象**：首次请求 15-45s 延迟\n**根因**：免费 tier 无请求时容器休眠\n**方案**：\n- A. 接受延迟（个人使用）\n- B. Ping 保活（cron 每 5 分钟请求 /healthz）\n- C. 升级到付费 tier（保持实例）\n\n### 1.3.2 Gateway 重启问题\n\n**错误做法**（无 systemd）：\n```bash\nopenclaw gateway restart  # 可能失效或配置丢失\n```\n\n**正确做法**（Railway / ClawCloud 通用）：\n```bash\n# 使用 Wrapper API\nAUTH=$(echo -n \":${SETUP_PASSWORD}\" | base64)\ncurl -s -X POST http://127.0.0.1:8080/setup/api/console/run \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Basic $AUTH\" \\\n  -d '{\"cmd\":\"gateway.restart\"}'\n\n# Railway 也可用 Dashboard 重启\n```\n\n### 1.3.3 Browser-Use 首次超时\n\n**现象**：冷启动后 browser-use 任务超时\n**根因**：首次需下载 Chromium（20-40s）\n**修复**：预下载 Chromium\n\n```bash\n#!/bin/bash\n# scripts/preload-browser.sh\nCACHE_DIR=\"/data/.cache/ms-playwright\"\n\nif [ -d \"$CACHE_DIR\" ] && [ \"$(ls -A $CACHE_DIR)\" ]; then\n    echo \"✅ Chromium cache exists\"\n    exit 0\nfi\n\npip install playwright\npython -m playwright install chromium\necho \"✅ Chromium downloaded to $CACHE_DIR\"\n```\n\n### 1.3.4 Cron 时区问题\n\n**现象**：北京时间 10:30 的任务在 02:30 执行\n**根因**：容器默认 UTC\n**修复**：\n\n```bash\n# 启动脚本中添加\nexport TZ=Asia/Shanghai\nln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone\n```\n\n或在 cron 配置中明确指定：\n```json\n{\n  \"schedule\": {\n    \"kind\": \"cron\",\n    \"expr\": \"30 10 * * *\",\n    \"tz\": \"Asia/Shanghai\"\n  }\n}\n```\n\n## 1.4 MiaoDX Fork 特色功能\n\n### 1.4.1 Anthropic 模型支持\n\n**配置**：\n```json\n{\n  \"providers\": {\n    \"anthropic\": {\n      \"apiKey\": \"${ANTHROPIC_API_KEY}\",\n      \"baseUrl\": \"https://api.anthropic.com\"\n    }\n  }\n}\n```\n\n**可用模型**：\n- `anthropic/claude-opus-4-6`\n- `anthropic/claude-sonnet-4-6`\n- `anthropic/claude-haiku-3-5`\n\n**GSD 已配置模型**：\n- `anthropic_kimi/k2-5` (默认)\n\n### 1.4.2 CDP 浏览器支持（三层网络浏览 L3）\n\n**启用**：\n```bash\n# 环境变量\nBROWSER_USE_CDP=true\nBROWSER_CDP_URL=ws://localhost:9222\n```\n\n**使用场景**：\n- 复杂网页自动化（登录、表单、多步骤）\n- 需要 JavaScript 渲染的动态内容\n- 绕过简单反爬\n\n**与 L1/L2 对比**：\n\n| 层级 | 工具 | 适用场景 | 成本 |\n|------|------|----------|------|\n| L1 | web_search | 简单查询、新闻 | 低 |\n| L2 | web_fetch/browser | 静态/动态页面内容 | 中 |\n| L3 | CDP / browser-use | 复杂交互、自动化 | 高 |\n\n## 1.5 平台选择建议\n\n| 场景 | 推荐平台 | 原因 |\n|------|----------|------|\n| **个人低频使用** | Railway | $0 成本，MiaoDX fork 功能完整 |\n| **需要 Web 管理** | Railway | 内置 /healthz /openclaw /setup |\n| **重负载任务** | ClawCloud Run | 16 cores + 123GB 内存 |\n| **无冷启动要求** | ClawCloud Run | 持久容器，随时响应 |\n| **GitHub 老用户** | ClawCloud Run | 可能完全免费 |\n| **快速上手** | Railway | 模板成熟，一键部署 |\n\n**成本对比**：\n\n| 平台 | 月费 | 免费额度 | GitHub 优惠 |\n|------|------|----------|-------------|\n| Railway | $0 | 500h/月 | 无 |\n| ClawCloud Run | $5 | 首月 $5 credit | $5/月（账号>180天）|\n\n## 1.6 部署检查清单\n\n### Railway 部署检查清单\n\n- [ ] Fork `ChaptersOfFloatingLife/clawdbot-railway-template`\n- [ ] Railway Dashboard → New Project → Deploy from GitHub\n- [ ] 添加环境变量（SETUP_PASSWORD, API keys）\n- [ ] 添加 Volume：/data\n- [ ] Deploy 并等待启动\n- [ ] 访问 /setup 完成初始化\n- [ ] 测试 /healthz 端点\n- [ ] 配置 cron 时区（TZ=Asia/Shanghai）\n- [ ] 预下载 Chromium（可选）\n\n### ClawCloud Run 部署检查清单\n\n- [ ] Dashboard → Create Service → Docker\n- [ ] 选择基础镜像（ubuntu:22.04）\n- [ ] 手动安装 OpenClaw\n- [ ] 配置 Volume：/data\n- [ ] 设置环境变量\n- [ ] 配置健康检查（如需）\n- [ ] 部署并测试\n\n## 1.7 后续维护与监控\n\n部署完成后，需要建立长期维护机制：\n\n### 1.7.1 Cron Job 健康检查\n\n**GSD (Railway)**：\n- Container Health Check：每 10 分钟检查 gateway 状态\n- Daily Gateway Restart：每天 03:00 Shanghai 自动重启\n- Memory Sync：每天 02:00 同步到 GitHub\n\n**WLB (ClawCloud Run)**：\n- System Status Monitor：每小时检查系统状态\n- Daily Learning Exchange：每天 01:45 分享昨日实践\n\n### 1.7.2 三层防护架构\n\n**L1 - Railway/ClawCloud 层**：\n- Railway：内置容器重启策略 (`--restart unless-stopped`)\n- ClawCloud：持久容器，无自动休眠\n\n**L2 - 容器内 Watchdog**：\n- 每 10 分钟检查 gateway 健康状态\n- 自动清理 stale lock 文件 (>30min)\n- 必要时自动重启 gateway\n\n**L3 - 跨实例心跳**：\n- WLB ↔ GSD 每 30 分钟互检\n- GitHub 同步心跳文件\n- >60 分钟未更新则告警\n\n### 1.7.3 日常维护清单\n\n**每日**：\n- [ ] 检查 Daily Sync 是否正常运行（01:00-01:10）\n- [ ] 查看是否有 stale lock 文件告警\n\n**每周**：\n- [ ] 检查 Volume 使用率（/data 目录）\n- [ ] 审查 cron job 执行日志\n\n**每月**：\n- [ ] 更新模型列表和 API keys\n- [ ] 备份重要配置和记忆文件\n\n---\n\n*本章节基于实际部署经验：GSD@Railway + WLB@ClawCloud Run，更新于 2026-03-12*\n\n---\n\n## Part 2: 配置优化\n\n### 2.1 CDP 配置（有鉴权的网站）\n\n#### 什么是 CDP？\nCDP (Chrome DevTools Protocol) 允许 OpenClaw 控制浏览器，访问需要登录的网站。\n\n#### 安装和配置步骤\n\n**安装 Chromium + CDP：**\n```bash\n# 运行安装脚本\nbash install-browser-cdp.sh\n```\n\n**启动 CDP 服务：**\n```bash\n# 启动 Chromium + CDP + VNC\nbash start-browser-cdp.sh\n```\n\n**验证 CDP 连接：**\n```bash\n# 检查 CDP 端点\ncurl http://localhost:9222/json/version\n```\n\n**配置 OpenClaw 连接：**\n```python\nfrom browser_use import Agent, Browser, BrowserConfig\n\nbrowser = Browser(config=BrowserConfig(\n    cdp_url=\"ws://localhost:9222\"\n))\n```\n\n### 2.2 模型互补策略\n\n| 模型 | 用途 | 优势 | 限制 |\n|------|------|------|------|\n| **kimi-coding/k2p5** | 代码生成、调试 | 中文理解好，代码质量高 | API 访问受限 |\n| **openai_modelverse/gpt-5.2** | 复杂推理、长文本 | 推理能力强，支持长上下文 | 成本较高 |\n| **anthropic_aliyun/kimi-k2.5** | 中文任务 | 中文优化，成本适中 | - |\n| **anthropic_aliyun/glm-5** | 通用任务 | 平衡性能和成本 | - |\n\n**模型路由策略：**\n```python\ndef select_model(task_type, complexity):\n    if task_type == \"coding\":\n        return \"kimi-coding/k2p5\"\n    elif task_type == \"reasoning\" and complexity == \"high\":\n        return \"openai_modelverse/gpt-5.2\"\n    elif task_type == \"chinese\":\n        return \"anthropic_aliyun/kimi-k2.5\"\n    else:\n        return \"anthropic_aliyun/glm-5\"\n```\n\n### 2.3 多层网页处理\n\n| 层级 | 工具 | 适用场景 |\n|------|------|----------|\n| **L1** | Brave Search API | 快速搜索、新闻、简单事实查询 |\n| **L2** | browser-use / CDP | 获取完整页面内容、JS 渲染网站 |\n| **L3** | Kavily API | 复杂网页自动化、表单填写 |\n\n**决策流程：**\n```\n用户请求 → 评估复杂度\n    ↓\n简单查询? ──是──→ Brave Search (L1)\n    ↓否\n需页面内容? ──是──→ browser-use/CDP (L2)\n    ↓否\n需多步交互? ──是──→ Kavily API (L3)\n```\n\n### 2.4 性能优化\n\n**模型耗时对比：**\n\n| 模型 | 平均延迟 | 适用场景 |\n|------|----------|----------|\n| kimi-k2.5 | ~1.5s | 中文任务、代码生成 |\n| gpt-5.2 | ~3.5s | 复杂推理、长文本 |\n| glm-5 | ~2.0s | 通用任务 |\n\n**并发处理：**\n- 单线程：适合简单任务\n- 多线程：适合批量处理\n- 异步：适合 I/O 密集型任务\n\n### 2.5 实战配置示例\n\n```yaml\n# config.yaml\nmodels:\n  default: \"anthropic_aliyun/kimi-k2.5\"\n  coding: \"kimi-coding/k2p5\"\n  reasoning: \"openai_modelverse/gpt-5.2\"\n\nbrowser:\n  cdp_enabled: true\n  cdp_endpoint: \"http://localhost:9222\"\n  \nsearch:\n  brave_api_key: \"${BRAVE_API_KEY}\"\n  kavily_api_key: \"${KAVILY_API_KEY}\"\n```\n\n---\n\n## Part 3: 最佳实践\n\n### 3.1 任务管理最佳实践\n\n#### 三层架构\n1. **L1 Subagent**: 内部 brainstorming（用户不可见）\n2. **L2 Thread**: 最小状态更新（用户可见）\n3. **L3 主频道**: 最终完整结果（用户可见）\n\n#### 任务分类\n- **简单任务**: 直接处理，无需子代理\n- **中等任务**: 使用子代理，但限制搜索次数\n- **复杂任务**: 主代理先研究，再分配子任务\n\n### 3.2 协作模式最佳实践\n\n#### 双代理协作（WLB + GSD）\n- **WLB**: 负责文档编写、基准测试、技术细节\n- **GSD**: 负责数据收集、验证、补充内容\n- **MiaoDX**: 最终审核、发布\n\n#### 沟通规范\n- 使用 Slack Thread 进行详细讨论\n- 主频道只发布最终结果\n- 使用反应符号更新状态（👀⏳✅）\n\n#### 文件同步\n- GitHub 仓库: `https://github.com/MiaoDX/claw-agents-shared`\n- 同步频率: 每日两次（北京时间 10:00 和 22:00）\n\n### 3.3 安全最佳实践\n\n#### API Key 管理\n- 所有密钥存放在 `.env` 文件\n- 不在非 `.env` 文件中硬编码密钥\n- 只向 MiaoDX 本人发送密钥（私信）\n\n#### 权限控制\n- 群聊中不发送任何敏感信息\n- 私信发送前验证接收者身份\n\n---\n\n## Part 4: 实战案例\n\n### 4.1 案例：Cron Job Tool Schema Bug 修复 (2026-03-11)\n\n**问题**: `isolated + agentTurn` 配置触发 tool schema validation error\n**影响**: 所有 cron job 执行失败\n**修复**: 改用 `main + systemEvent` 配置\n**教训**: 配置变更后必须立即测试，不能只看 status ok\n\n### 4.2 案例：双实例宕机 6 小时恢复 (2026-03-11)\n\n**问题**: WLB + GSD 同时离线\n**根因**: stale lock + Docker 无 systemd\n**修复**: 三层防护架构\n**产出**: L1 Docker policy + L2 watchdog + L3 心跳\n\n### 4.3 案例：安全事件 (2026-03-11)\n\n**问题**: API key 误发给第三方\n**根因**: DM ≠ 授权，未做身份验证\n**修复**: 硬边界规则更新（只发 MiaoDX）\n**教训**: 安全策略是硬边界，不是建议\n\n---\n\n*最后更新: 2026-03-12*\n", "part1-deployment-rewrite-draft.md": "# Part 1: 云端部署指南（重写版草稿）\n\n> 本文档基于实际部署经验：GSD 运行在 Railway，WLB 运行在 ClawCloud Run。\n\n## 1.1 部署方案概览\n\n我们采用 **双平台部署策略**：\n\n| 实例 | 平台 | 用途 | 特点 |\n|------|------|------|------|\n| **GSD** | Railway | 主力执行 | 轻量、易扩展、有冷启动 |\n| **WLB** | ClawCloud Run | 备用/高负载 | 持久容器、无冷启动、资源充足 |\n\n### 1.1.1 Railway 部署（GSD）\n\n**模板**: `ChaptersOfFloatingLife/clawdbot-railway-template` (MiaoDX fork)\n\n**核心改进**（相比原版）：\n- ✅ Anthropic 模型原生支持\n- ✅ CDP 浏览器支持（三层网络浏览 L3）\n- ✅ Web 管理界面（/healthz, /openclaw, /setup）\n\n**部署步骤**：\n\n```bash\n# 1. Railway Dashboard → New Project → Deploy from GitHub repo\n# 2. 选择模板：ChaptersOfFloatingLife/clawdbot-railway-template\n# 3. 添加环境变量：\n#    - SETUP_PASSWORD=your_secure_password\n#    - OPENAI_API_KEY=sk-...\n#    - ANTHROPIC_API_KEY=sk-ant-... (可选，用于 Claude 模型)\n# 4. 添加 Volume：/data → Persistent\n# 5. Deploy\n```\n\n**Web 管理端点**：\n\n| 端点 | 用途 | 访问方式 |\n|------|------|----------|\n| `/healthz` | 健康检查 | 公开，Railway 自动调用 |\n| `/openclaw` | 控制台 | 需 SETUP_PASSWORD |\n| `/setup` | 初始化向导 | 首次配置使用 |\n\n**关键特性**：\n- 冷启动：15-45s（免费 tier 休眠后）\n- 持久化：/data 目录（Volume 挂载）\n- 无 systemd：使用 wrapper API 管理 gateway\n\n### 1.1.2 ClawCloud Run 部署（WLB）\n\n**方式**: Docker 容器（非 Railway 模板）\n\n**资源配置**：\n- CPU: 16 cores Xeon Platinum\n- 内存: 123GB\n- 磁盘: 7.8GB Volume\n- **无冷启动**：持久容器，随时响应\n\n**部署步骤**：\n\n```bash\n# 1. ClawCloud Dashboard → Create Service → Docker\n# 2. 镜像：ubuntu:22.04（或其他基础镜像）\n# 3. 手动安装 OpenClaw（见官方文档）\n# 4. 配置 Volume：/data\n# 5. 设置环境变量\n```\n\n**与 Railway 的差异**：\n- 无内置 /openclaw /setup 端点（需自行配置或不用）\n- **有 /healthz 端点**：端口 18792（与 Railway 相同）\n- 资源充足，适合重负载任务\n- 无冷启动问题\n- 成本：$5/月（GitHub 老用户可能免费）\n\n## 1.2 平台对比实测\n\n### 1.2.1 基础指标\n\n| 指标 | ClawCloud Run | Railway |\n|------|---------------|---------|\n| **CPU** | 16 cores Xeon Platinum | 共享 |\n| **内存** | 123GB | ~512MB (免费额度) |\n| **磁盘** | 7.8GB Volume | /data Volume |\n| **冷启动** | 无（持久容器） | 15-45s |\n| **网络延迟** | ~980ms HTTP / 11ms DNS | 依赖地区 |\n| **Systemd** | ❌ | ❌ |\n| **Volume 持久化** | ✅ | ✅ |\n| **Web 管理界面** | ❌（无内置 /openclaw /setup） | ✅（内置 /openclaw /setup） |\n| **健康检查** | ✅ /healthz (18792) | ✅ /healthz (18792) |\n\n### 1.2.2 模型响应耗时实测\n\n**测试环境**：2026-03-05\n- **WLB (ClawCloud Run)**: 16 cores + 123GB RAM，持久容器\n- **GSD (Railway)**: 共享 CPU + ~512MB RAM，有冷启动\n- **模型**: `openai_mino/mimo-claw-0301`\n\n| 测试提示 | ClawCloud Run | Railway（热） |\n|----------|---------------|---------------|\n| \"你好\" | 7.45s | 8.20s |\n| \"请用中文回复：测试消息\" | 7.50s | 8.35s |\n| \"简单介绍一下你自己\" | 9.00s | 10.10s |\n| **平均耗时** | **7.98s** | **8.88s** |\n\n> 注：Railway 冷启动后首次请求需 +15-45s\n\n## 1.3 常见问题与修复\n\n### 1.3.1 Railway 冷启动慢\n\n**现象**：首次请求 15-45s 延迟\n**根因**：免费 tier 无请求时容器休眠\n**方案**：\n- A. 接受延迟（个人使用）\n- B. Ping 保活（cron 每 5 分钟请求 /healthz）\n- C. 升级到付费 tier（保持实例）\n\n### 1.3.2 Gateway 重启问题\n\n**错误做法**（无 systemd）：\n```bash\nopenclaw gateway restart  # 可能失效或配置丢失\n```\n\n**正确做法**（Railway / ClawCloud 通用）：\n```bash\n# 使用 Wrapper API\nAUTH=$(echo -n \":${SETUP_PASSWORD}\" | base64)\ncurl -s -X POST http://127.0.0.1:8080/setup/api/console/run \\\n  -H \"Content-Type: application/json\" \\\n  -H \"Authorization: Basic $AUTH\" \\\n  -d '{\"cmd\":\"gateway.restart\"}'\n\n# Railway 也可用 Dashboard 重启\n```\n\n### 1.3.3 Browser-Use 首次超时\n\n**现象**：冷启动后 browser-use 任务超时\n**根因**：首次需下载 Chromium（20-40s）\n**修复**：预下载 Chromium\n\n```bash\n#!/bin/bash\n# scripts/preload-browser.sh\nCACHE_DIR=\"/data/.cache/ms-playwright\"\n\nif [ -d \"$CACHE_DIR\" ] && [ \"$(ls -A $CACHE_DIR)\" ]; then\n    echo \"✅ Chromium cache exists\"\n    exit 0\nfi\n\npip install playwright\npython -m playwright install chromium\necho \"✅ Chromium downloaded to $CACHE_DIR\"\n```\n\n### 1.3.4 Cron 时区问题\n\n**现象**：北京时间 10:30 的任务在 02:30 执行\n**根因**：容器默认 UTC\n**修复**：\n\n```bash\n# 启动脚本中添加\nexport TZ=Asia/Shanghai\nln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone\n```\n\n或在 cron 配置中明确指定：\n```json\n{\n  \"schedule\": {\n    \"kind\": \"cron\",\n    \"expr\": \"30 10 * * *\",\n    \"tz\": \"Asia/Shanghai\"\n  }\n}\n```\n\n## 1.4 MiaoDX Fork 特色功能\n\n### 1.4.1 Anthropic 模型支持\n\n**配置**：\n```json\n{\n  \"providers\": {\n    \"anthropic\": {\n      \"apiKey\": \"${ANTHROPIC_API_KEY}\",\n      \"baseUrl\": \"https://api.anthropic.com\"\n    }\n  }\n}\n```\n\n**可用模型**：\n- `anthropic/claude-opus-4-6`\n- `anthropic/claude-sonnet-4-6`\n- `anthropic/claude-haiku-3-5`\n\n**GSD 已配置模型**：\n- `anthropic_kimi/k2-5` (默认)\n\n### 1.4.2 CDP 浏览器支持（三层网络浏览 L3）\n\n**启用**：\n```bash\n# 环境变量\nBROWSER_USE_CDP=true\nBROWSER_CDP_URL=ws://localhost:9222\n```\n\n**使用场景**：\n- 复杂网页自动化（登录、表单、多步骤）\n- 需要 JavaScript 渲染的动态内容\n- 绕过简单反爬\n\n**与 L1/L2 对比**：\n\n| 层级 | 工具 | 适用场景 | 成本 |\n|------|------|----------|------|\n| L1 | web_search | 简单查询、新闻 | 低 |\n| L2 | web_fetch/browser | 静态/动态页面内容 | 中 |\n| L3 | CDP / browser-use | 复杂交互、自动化 | 高 |\n\n## 1.5 平台选择建议\n\n| 场景 | 推荐平台 | 原因 |\n|------|----------|------|\n| **个人低频使用** | Railway | $0 成本，MiaoDX fork 功能完整 |\n| **需要 Web 管理** | Railway | 内置 /healthz /openclaw /setup |\n| **重负载任务** | ClawCloud Run | 16 cores + 123GB 内存 |\n| **无冷启动要求** | ClawCloud Run | 持久容器，随时响应 |\n| **GitHub 老用户** | ClawCloud Run | 可能完全免费 |\n| **快速上手** | Railway | 模板成熟，一键部署 |\n\n**成本对比**：\n\n| 平台 | 月费 | 免费额度 | GitHub 优惠 |\n|------|------|----------|-------------|\n| Railway | $0 | 500h/月 | 无 |\n| ClawCloud Run | $5 | 首月 $5 credit | $5/月（账号>180天）|\n\n## 1.6 部署检查清单\n\n### Railway 部署检查清单\n\n- [ ] Fork `ChaptersOfFloatingLife/clawdbot-railway-template`\n- [ ] Railway Dashboard → New Project → Deploy from GitHub\n- [ ] 添加环境变量（SETUP_PASSWORD, API keys）\n- [ ] 添加 Volume：/data\n- [ ] Deploy 并等待启动\n- [ ] 访问 /setup 完成初始化\n- [ ] 测试 /healthz 端点\n- [ ] 配置 cron 时区（TZ=Asia/Shanghai）\n- [ ] 预下载 Chromium（可选）\n\n### ClawCloud Run 部署检查清单\n\n- [ ] Dashboard → Create Service → Docker\n- [ ] 选择基础镜像（ubuntu:22.04）\n- [ ] 手动安装 OpenClaw\n- [ ] 配置 Volume：/data\n- [ ] 设置环境变量\n- [ ] 配置健康检查（如需）\n- [ ] 部署并测试\n\n## 1.7 后续维护与监控\n\n部署完成后，需要建立长期维护机制：\n\n### 1.7.1 Cron Job 健康检查\n\n**GSD (Railway)**：\n- Container Health Check：每 10 分钟检查 gateway 状态\n- Daily Gateway Restart：每天 03:00 Shanghai 自动重启\n- Memory Sync：每天 02:00 同步到 GitHub\n\n**WLB (ClawCloud Run)**：\n- System Status Monitor：每小时检查系统状态\n- Daily Learning Exchange：每天 01:45 分享昨日实践\n\n### 1.7.2 三层防护架构\n\n**L1 - Railway/ClawCloud 层**：\n- Railway：内置容器重启策略 (`--restart unless-stopped`)\n- ClawCloud：持久容器，无自动休眠\n\n**L2 - 容器内 Watchdog**：\n- 每 10 分钟检查 gateway 健康状态\n- 自动清理 stale lock 文件 (>30min)\n- 必要时自动重启 gateway\n\n**L3 - 跨实例心跳**：\n- WLB ↔ GSD 每 30 分钟互检\n- GitHub 同步心跳文件\n- >60 分钟未更新则告警\n\n### 1.7.3 日常维护清单\n\n**每日**：\n- [ ] 检查 Daily Sync 是否正常运行（01:00-01:10）\n- [ ] 查看是否有 stale lock 文件告警\n\n**每周**：\n- [ ] 检查 Volume 使用率（/data 目录）\n- [ ] 审查 cron job 执行日志\n\n**每月**：\n- [ ] 更新模型列表和 API keys\n- [ ] 备份重要配置和记忆文件\n\n---\n\n*本章节基于实际部署经验：GSD@Railway + WLB@ClawCloud Run*\n"};

function loadArticle(file) {
  const content = document.getElementById('content');
  const md = contents[file];
  if (md) {
    content.innerHTML = marked.parse(md);
    const link = document.createElement('a');
    link.href = `https://github.com/MiaoDX/claw-agents-shared/blob/main/drafts/blog/${file}`;
    link.target = '_blank';
    link.className = 'github-link';
    link.textContent = '🔗 在 GitHub 上查看源文件';
    content.appendChild(link);
  } else {
    content.innerHTML = '<p style="color:#c00">文章未找到</p>';
  }
}

function init() {
  const tabs = document.getElementById('tabs');
  articles.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = a.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadArticle(a.file);
    };
    tabs.appendChild(btn);
  });
  loadArticle(articles[0].file);
}

init();
</script>
