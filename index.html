<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiaoDX — Learn in Public</title>
  <meta name="description" content="缪东旭（MiaoDX）：AI Agent 协作系统实践者，公开构建、持续复盘" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #f5f1ea; font-family: 'Inter', sans-serif; }
    #root { min-height: 100vh; }

    /* Floating toggles */
    .mx-toggle {
      position: fixed; z-index: 100;
      display: flex; gap: 2px; padding: 3px;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(26,22,19,0.12);
      border-radius: 999px;
      box-shadow: 0 4px 14px rgba(26,22,19,0.08);
      font-family: 'JetBrains Mono', monospace;
    }
    .mx-toggle.left { top: 16px; left: 16px; }
    .mx-toggle.right { top: 16px; right: 16px; }
    .mx-toggle button {
      border: none; background: transparent;
      color: #534b42;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px; letter-spacing: 0.1em; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .mx-toggle button:hover { color: #1a1613; }
    .mx-toggle button.active {
      background: #1a1613; color: #f5f1ea;
    }
    .mx-toggle .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: 0.6;
    }

    /* Lightbox */
    .mx-lightbox {
      position: fixed; inset: 0;
      background: rgba(26,22,19,0.94);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 40px; cursor: zoom-out;
    }
    .mx-lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; }
    .mx-lightbox .cap {
      position: absolute; bottom: 24px; left: 0; right: 0; text-align: center;
      color: #f5f1ea;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="692d1a5b-80c6-4a7f-b783-69260b9dd419"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="content.js"></script>
  <script type="text/babel" src="editorial.jsx"></script>
  <script type="text/babel" src="terminal.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [style, setStyle] = useState(() => {
        try { return localStorage.getItem('mx-style') || 'editorial'; } catch (e) { return 'editorial'; }
      });
      const [lang, setLang] = useState(() => {
        try { return localStorage.getItem('mx-lang') || 'zh'; } catch (e) { return 'zh'; }
      });
      const [lightbox, setLightbox] = useState(null);

      useEffect(() => { try { localStorage.setItem('mx-style', style); } catch (e) {} }, [style]);
      useEffect(() => { try { localStorage.setItem('mx-lang', lang); } catch (e) {} document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en'; }, [lang]);
      useEffect(() => {
        if (!lightbox) return;
        const onKey = (e) => { if (e.key === 'Escape') setLightbox(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [lightbox]);

      return (
        <>
          <div className="mx-toggle left" role="group" aria-label="Style">
            <button className={style === 'editorial' ? 'active' : ''} onClick={() => setStyle('editorial')}>
              <span className="dot"></span>EDITORIAL
            </button>
            <button className={style === 'terminal' ? 'active' : ''} onClick={() => setStyle('terminal')}>
              <span className="dot"></span>TERMINAL
            </button>
          </div>
          <div className="mx-toggle right" role="group" aria-label="Language">
            <button className={lang === 'zh' ? 'active' : ''} onClick={() => setLang('zh')}>中</button>
            <button className={lang === 'en' ? 'active' : ''} onClick={() => setLang('en')}>EN</button>
          </div>

          {style === 'editorial'
            ? <EditorialDesign lang={lang} onLightbox={setLightbox} />
            : <TerminalDesign lang={lang} onLightbox={setLightbox} />}

          {lightbox && (
            <div className="mx-lightbox" onClick={() => setLightbox(null)}>
              <img src={lightbox.src} alt={lightbox.caption} />
              <div className="cap">{lightbox.caption}</div>
            </div>
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
